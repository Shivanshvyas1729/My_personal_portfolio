    title: Pandas Data Combining Functions — Purpose & Key Parameters
    content: |
      | Function      | What it does                                                    | Main Use                   | Most Used Parameters               |
      | ------------- | --------------------------------------------------------------- | -------------------------- | ---------------------------------- |
      | `pd.concat()` | Combines DataFrames by stacking them vertically or horizontally | Add rows or columns        | `axis=0/1`, `ignore_index=True`    |
      | `df.join()`   | Joins DataFrames mainly using indexes                           | Attach columns using index | `how`, `on`                        |
      | `pd.merge()`  | SQL-style join using common columns                             | Relational data joining    | `on`, `how`, `left_on`, `right_on` |

      ### Quick Meaning

      * `concat` → Stack data
      * `join` → Index-based combine
      * `merge` → Database/SQL-like join
