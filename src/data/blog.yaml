    title: type of Cloud storage based on  By Architecture
    slug: type-of-cloud-storage-based-on-by-architecture
    readingTime: 1
    content: |-
      # Types of Cloud Storage

      Cloud storage is mainly divided based on **how data is stored**.

      | Type               | How It Works                                        | Best For                                           | Examples                                              |
      | ------------------ | --------------------------------------------------- | -------------------------------------------------- | ----------------------------------------------------- |
      | **Object Storage** | Stores data as objects with unique IDs and metadata | Photos, videos, backups, AI data                   | Amazon Web Services S3, Google Cloud Storage          |
      | **Block Storage**  | Splits data into fixed-size blocks for fast access  | Databases, virtual machines, high-performance apps | Amazon Web Services EBS, Microsoft Azure Disk Storage |
      | **File Storage**   | Uses folders and files like a normal computer       | Shared drives, team collaboration, documents       | Microsoft Azure Files, Dropbox Dropbox                |

      ## Quick Summary

      * **Object Storage →** Massive unstructured data
      * **Block Storage →** High speed & performance
      * **File Storage →** Easy sharing & collaboration
